name: "🚀 Release"

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 🏗 Build before publish
        run: pnpm turbo run build

      - name: 🚀 Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 📢 Discord Notification
        if: steps.changesets.outputs.published == 'true'
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          username: "Release Bot - 머먹지"
          avatar-url: "https://img.notionusercontent.com/s3/prod-files-secure%2Fd89212bd-c144-4566-9010-ebe30df48219%2F2d9d2239-c74b-481c-8373-8dc2cf3abe1c%2Ffavicon_32_1.png/size/w=1960?exp=1772505263&sig=QgMuULWcx9ZYh4FyT3LMhWW_LOg_Lc3n0N88wgLa59Q&id=3175213d-cd4c-8084-a0a2-e8811becb27b&table=block&userId=7c651602-8ef2-4223-8e7e-fe17a4696f75"
          content: |
            🚀 **머먹지 npm 배포 완료**

            📦 Published Packages:
            ${{ steps.changesets.outputs.publishedPackages }}

            🔗 npm: https://www.npmjs.com/org/mumukji